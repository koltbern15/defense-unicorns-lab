control-implementation-status: Implemented
security-control-designation: Applicable - tagging/labeling baseline reduces privilege scope for workload deployment
control-implementation-narrative: >-
  This lab implements AC-6.1 (least privilege) through mandatory governance
  labeling enforced by a Pepr admission webhook. All Deployments deployed to
  the lab-apps namespace must carry a cost-center label (defining the
  organizational unit responsible for the workload). The Pepr capability
  defines two rules: (1) Mutate rule: if a Deployment lacks an owner label,
  inject owner=unassigned (baseline governance). (2) Validate rule: if a
  Deployment lacks a cost-center label, deny admission with a descriptive
  error message. This model enforces least privilege by requiring each
  workload to declare its cost center before deployment; unauthorized
  deployments (those without proper labeling) are rejected outright. The Pepr
  controller runs under a ServiceAccount with minimal Kubernetes RBAC
  permissions (watch Deployments, mutate/validate webhooks only). Developers
  can only deploy Deployments that pass the Pepr validation policy, ensuring
  no unlabeled (ungoverned) workloads enter the cluster. This mirrors
  real-world Conditional Access policies: device compliance is verified
  before granting access; workload governance is verified before deployment.
  The policy is declarative and fails safe: if Pepr is unavailable (error
  behavior: reject), even compliant workloads are blocked (demonstrated in
  Session 1). This ensures policy is always enforced.
uds-alignment: pepr-admission-control

