family: AC
control-acronym: AC-6
control-information: >-
  Description:

  The organization employs the principle of least privilege for all
  organizational users, processes acting on behalf of users, and devices.
  The principle of least privilege is implemented by restricting users,
  processes, and devices to only the minimum set of resources, functions, or
  information necessary to accomplish assigned tasks or roles.


  Supplemental Guidance:

  Organizations employ least privilege for specific duties and information
  systems. The principle of least privilege is a cornerstone of effective
  access control and applies to all access control decisions in the
  organization. When individuals, processes, or devices are granted access,
  they are granted only the minimum privileges necessary to accomplish
  organizational missions or business functions. Several factors consider in
  implementing least privilege: (1) role-based access control, (2)
  attribute-based access control, (3) service accounts and credentials,
  (4) just-in-time access elevation, (5) privileged access management.


ap-acronym: AC-6.1
cci: 002213
cci-definition: >-
  002213: The organization limits privileges to change the information system
  configuration.
implementation-guidance: >-
  The lab implements least privilege through two mechanisms: (1) Kubernetes
  RBAC for administrative access to clusters (Roles/RoleBindings restrict
  users to specific namespaces and operations; Pepr controller itself runs
  as a ServiceAccount with minimal permissions to watch Deployments and
  mutate/validate webhook requests), and (2) Pepr admission policy that
  enforces tagging baselines. The Pepr capability mutates all Deployments in
  the lab-apps namespace to add ownership and cost-center labels (baseline
  governance), and validates that Deployments carry required labels before
  admission. Non-compliant deployments are rejected at the API server by the
  Pepr webhook.

  Example: A developer attempting to deploy a Deployment without a
  cost-center label is denied at the API server with message "Deployments
  must carry a cost-center label (governance baseline)". Privileged
  developers (e.g., platform engineers) can deploy without labels if they
  explicitly request a mutation exception (not shown in this lab, but
  configurable via Pepr policy override capability).


  Recommended Compelling Evidence:

  1.) Pepr capability YAML showing mutate/validate rules for lab-apps
  namespace (~/projects/defense-unicorns-lab/pepr-module/iam-governance-lab/
  src/index.ts).

  2.) Kubernetes RBAC role for Pepr controller (kubectl get role -n pepr-system
  -o yaml).

  3.) Live test: Deployment rejection event log (kubectl describe deployment
  rogue-app -n lab-apps).

assessment-procedures: >-
  Test 1: Verify Pepr ServiceAccount has minimal permissions (kubectl get
  role -n pepr-system pepr-system). Test 2: Attempt to deploy a Deployment
  without cost-center label and verify admission denial (kubectl apply -f
  rogue-app.yaml). Test 3: Deploy compliant Deployment (with cost-center
  label) and verify admission success. Test 4: Inspect mutated Deployment
  labels and confirm Pepr injected owner and governed-by labels. Test 5:
  Examine admission webhook logs in Pepr controller pod for deny decisions.
