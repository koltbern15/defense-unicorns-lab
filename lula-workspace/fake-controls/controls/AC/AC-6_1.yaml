family: AC
control-acronym: AC-6
control-information: >-
  Description:

  The organization employs the principle of least privilege for all
  organizational users, processes acting on behalf of users, and devices.
  The principle of least privilege is implemented by restricting users,
  processes, and devices to only the minimum set of resources, functions, or
  information necessary to accomplish assigned tasks or roles.


  Supplemental Guidance:

  Organizations employ least privilege for specific duties and information
  systems. The principle of least privilege is a cornerstone of effective
  access control and applies to all access control decisions in the
  organization. When individuals, processes, or devices are granted access,
  they are granted only the minimum privileges necessary to accomplish
  organizational missions or business functions. Several factors consider in
  implementing least privilege: (1) role-based access control, (2)
  attribute-based access control, (3) service accounts and credentials,
  (4) just-in-time access elevation, (5) privileged access management.


ap-acronym: AC-6.1
cci: '002213'
cci-definition: >-
  002213: The organization limits privileges to change the information system
  configuration.
implementation-guidance: >-
  The lab implements least privilege through two mechanisms: (1) scoped
  Kubernetes RBAC for the admission controller itself (the Pepr module is
  built with rbacMode: scoped, so its ClusterRole is generated from the
  capabilities it declares — limited to its own PeprStore custom resources
  and CRD registration; admission requests reach the controller through
  webhooks, so it needs no read or write access to workload APIs), and (2)
  a Pepr admission policy that enforces tagging baselines. The Pepr capability mutates Deployments in
  the lab-apps namespace to add governance labels (governed-by=pepr-iam-policy
  always, and owner=unassigned when no owner label is set), and validates
  that Deployments carry a required cost-center label before admission.
  Non-compliant deployments are rejected at the API server by the Pepr
  webhook.

  Example: A developer attempting to deploy a Deployment without a
  cost-center label is denied at the API server with the message
  "Deployments must carry a 'cost-center' label (governance baseline)."
  There is no bypass path in the capability — exceptions would require a
  change to the policy source itself, which is intentional for a
  governance baseline.


  Recommended Compelling Evidence:

  1.) Pepr capability source showing mutate/validate rules for the lab-apps
  namespace (pepr-module/iam-governance-lab/capabilities/iam-governance.ts).

  2.) Generated scoped ClusterRole for the Pepr controller (kubectl get
  clusterrole pepr-iam-governance-lab -o yaml).

  3.) Live test: server-side dry-run of the noncompliant manifest (kubectl
  apply --dry-run=server -f test-manifests/noncompliant.yaml) returning the
  admission denial, and the matching deny decision in the Pepr controller
  logs (kubectl logs -n pepr-system deploy/pepr-iam-governance-lab).

assessment-procedures: >-
  Test 1: Verify the Pepr controller ClusterRole is scoped (kubectl get
  clusterrole pepr-iam-governance-lab -o yaml — expect only pepr.dev
  peprstores rules plus CRD create/patch). Test 2: Attempt to deploy a Deployment
  without a cost-center label and verify admission denial (kubectl apply
  --dry-run=server -f test-manifests/noncompliant.yaml). Test 3: Deploy compliant Deployment (with cost-center
  label) and verify admission success. Test 4: Inspect mutated Deployment
  labels and confirm Pepr injected owner and governed-by labels. Test 5:
  Examine admission webhook logs in Pepr controller pod for deny decisions.
