control-implementation-status: Implemented
security-control-designation: Applicable - OIDC and mTLS provide remote access security boundary
control-implementation-narrative: >-
  This lab implements AC-17.1 remote access security through a combination
  of cryptographic (TLS, in-mesh mTLS) and policy-based (OIDC,
  AuthorizationPolicy) controls. Remote access workflow: (1) User opens a
  browser to https://podinfo.uds.dev; TLS establishes encrypted transport
  at the tenant ingress gateway. (2) Traffic is routed through the ambient
  waypoint, where the ext_authz AuthorizationPolicy hands each request to
  the standalone authservice deployment. (3) With no valid session,
  authservice responds 302 to the Keycloak authorization endpoint
  (sso.uds.dev/realms/uds) using the OIDC authorization code flow with a
  PKCE S256 code challenge. (4) The user authenticates with Keycloak, which
  redirects back to the application with an authorization code. (5)
  Authservice exchanges the code for tokens server-side — validating
  signature via the realm JWKS endpoint, expiration, and audience — and
  establishes the browser session; bearer tokens are not handed to the
  browser in this flow. (6) The uds-lab-podinfo-jwt-authn
  RequestAuthentication and uds-lab-podinfo-jwt-authz DENY policy reject
  requests with missing, malformed, or expired JWTs. (7) ztunnel enforces
  L4 mTLS between mesh workloads, and AuthorizationPolicy restricts the pod
  to waypoint-mediated traffic. (8) Session termination: Keycloak sessions
  end at realm-configured timeouts (Keycloak defaults until tuned in the
  Admin Console) or via the OIDC end-session endpoint; the next request
  restarts the authentication flow. (9) Remote access events are recorded
  in the tenant-gateway Envoy access logs (source IP, method, path,
  response code, user agent, request ID), with Vector and Loki deployed for
  cluster-wide aggregation. This model ensures: (a) remote access requires
  valid OIDC credentials, (b) in-transit encryption via TLS and in-mesh
  mTLS, (c) session termination by timeout or logout, (d) an audit trail of
  remote access attempts.
