test-results: >-
  Test 1: OIDC token from Keycloak includes exp (expiration), aud
  (podinfo.uds.dev audience), and iss (issuer: https://keycloak.uds.dev/realms/master).
  Test 2: Authservice rejected request with expired token (403 Forbidden)
  before pod received it. Test 3: Keycloak realm configured with session
  timeout of 30 minutes (Admin Console > Realm Settings > Sessions). Test 4:
  Browser session cookie (keycloak.session) expired after 30 minutes; user
  redirected to Keycloak login page on next request. Test 5: Envoy access logs
  captured session termination event: "Unauthenticated=true,
  Authorization=Bearer expired_token".
control-implementation-status: Implemented
security-control-designation: Applicable - OIDC and mTLS provide remote access security boundary
control-implementation-narrative: >-
  This lab implements AC-17.1 remote access security through a combination of
  cryptographic (mTLS, token encryption) and policy-based (OIDC, AuthorizationPolicy)
  controls. Remote access workflow: (1) User opens browser to
  https://podinfo.uds.dev (TLS 1.3 establishes encrypted transport). (2)
  Ingress gateway receives request; Authservice intercepts and validates Bearer
  token. (3) If token missing or invalid, Authservice redirects to Keycloak
  OIDC authorization endpoint (sso.uds.dev). (4) User authenticates via
  Keycloak (username/password prompt); Keycloak issues Bearer token (contains
  exp, aud, iss, custom claims). (5) Browser follows 302 redirect back to
  podinfo with Bearer token in Authorization header. (6) Authservice validates
  token (checks signature via Keycloak JWKS endpoint, verifies expiration and
  audience claim). (7) Waypoint proxy enforces mTLS: verifies gateway identity
  via mTLS certificate (mutual TLS peer authentication). (8) Pod receives
  request with X-Remote-User header (injected by Authservice from token
  claims). (9) Session termination: Keycloak session expires after 30 minutes
  (configurable); user browser session cookie cleared; next request to
  podinfo triggers re-authentication flow. All remote access events logged:
  successful auth (200), failed auth (403), session expiration. This model
  ensures: (a) remote access requires valid OIDC credentials, (b) in-transit
  encryption via TLS and mTLS, (c) automatic session termination after
  configurable timeout, (d) full audit trail of all remote access attempts.
