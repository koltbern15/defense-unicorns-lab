family: AC
control-acronym: AC-17
control-information: >-
  Description:

  The organization:

  a. Establishes and implements a policy governing the use of remote access to
  the information system that addresses purpose, scope, roles, responsibilities,
  management commitment, coordination among organizational entities, and
  compliance;

  b. Facilitates remote access methods to the information system;

  c. Documents remote access configuration and connection procedures;

  d. Monitors and controls remote access methods; and

  e. Terminates remote access sessions and connections at the end of sessions.


  Supplemental Guidance:

  Remote access is any access to an organizational information system by a user
  (or an information system) communicating through an external network. External
  networks include the Internet, dedicated networks, public switched networks,
  and wireless networks. Users (or processes acting on behalf of users) can
  request access to organizational information systems via remote login and file
  transfer capabilities. Organizations must manage and monitor remote access
  sessions using, for example, automated session monitoring tools,
  encryption-based secure communications, and end-point protection devices.
  Organization-wide remote access policies address access implementation and
  enforcement, such as connection/disconnection of remote access sessions, use
  of encryption for remote sessions, monitoring of user activities, and
  documentation of remote access in system audit logs.


ap-acronym: AC-17.1
cci: '002415'
cci-definition: >-
  002415: The organization establishes a policy governing the use of remote
  access to the information system.
implementation-guidance: >-
  UDS Core enforces remote access security through the Istio Ambient mesh and
  OIDC authentication flow. Remote access (browser requests to podinfo via
  https://podinfo.uds.dev) is secured by: (1) in-mesh mTLS (the ztunnel node
  agent establishes L4 mTLS between mesh workloads, and AuthorizationPolicy
  restricts the pod to waypoint-mediated traffic), (2) OIDC validation (the
  standalone authservice deployment validates sessions and JWTs against
  Keycloak — signature via the realm JWKS endpoint, expiration, and claims),
  (3) session termination (Keycloak issues time-limited tokens; sessions end
  at realm-configured timeouts or via the OIDC end-session endpoint,
  https://sso.uds.dev/realms/uds/protocol/openid-connect/logout, as published
  in the realm discovery document). Remote access attempts are recorded in
  the tenant-gateway Envoy access logs with source IP, timestamp, method,
  request path, response code, user agent, and request ID; UDS Core also
  ships Vector and Loki for cluster-wide log aggregation.


  Recommended Compelling Evidence:

  1.) OIDC token inspection showing expiration claim (exp) and scope
  restrictions (aud, iss claims). 2.) Istio AuthorizationPolicy showing mTLS
  peer requirement. 3.) Keycloak session timeout configuration (Admin Console >
  Realm > Sessions > Session Settings). 4.) Tenant-gateway Envoy access-log
  entry showing an unauthenticated request answered with the 302 OIDC
  challenge before ever reaching the pod.

assessment-procedures: >-
  Test 1: Verify OIDC token carries expiration (exp) claim. Test 2: Attempt
  remote access with expired token and verify 403 rejection. Test 3: Verify
  Keycloak session configuration enforces session timeout. Test 4: Establish
  remote session, wait for session timeout, and verify automatic logout. Test 5:
  Examine access logs for remote access termination event (session cookie
  expiration or logout).
