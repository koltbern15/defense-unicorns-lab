family: AC
control-acronym: AC-3
control-information: >-
  Description:

  The information system enforces approved authorizations for logical access to
  information and system resources in accordance with applicable access control
  policies. The information system supports access control enforcement by:

  a. Defining and documenting access control policies for the information
  system;

  b. Enforcing access control policies via mechanisms (e.g., access control
  lists, role-based access control, attribute-based access control);

  c. Ensuring that access control enforcement is based on a current and
  accurate source of truth for access requirements; and

  d. Monitoring and logging access control decisions.


  Supplemental Guidance:

  Access enforcement represents the cornerstone of access control policy.
  Effective enforcement requires mechanisms that translate access policies
  (which are often written in natural language) into system-enforced rules and
  procedures. Access control enforcement may be accomplished by a variety of
  mechanisms (e.g., physical environmental controls, access control lists,
  cryptographic controls, or a combination thereof).


ap-acronym: AC-3.1
cci: '002142'
cci-definition: >-
  002142: The information system enforces approved authorizations for
  access to the information system in accordance with the access control
  policies.
implementation-guidance: >-
  UDS Core (Istio Ambient + Authservice) enforces declarative access control
  through operator-generated Istio AuthorizationPolicies and a per-package
  ambient waypoint. For the lab deployment:

  The UDS Operator generated four AuthorizationPolicies in the lab-sso-app
  namespace: deny-all-except-waypoint-uds-lab-podinfo-waypoint (DENY — the
  pod only accepts traffic that traversed the waypoint),
  protect-podinfo-ingress-9898-app-podinfo-uds-lab-podinfo-waypoint (ALLOW —
  admits tenant-gateway ingress to port 9898),
  uds-lab-podinfo-authservice (CUSTOM — routes requests at the waypoint to
  the standalone authservice deployment via Envoy ext_authz), and
  uds-lab-podinfo-jwt-authz (DENY — rejects requests failing JWT validation,
  paired with RequestAuthentication uds-lab-podinfo-jwt-authn). Authservice
  runs as its own deployment in the authservice namespace — ambient mode has
  no sidecars. Browser requests without a valid session are 302-redirected
  to Keycloak; requests presenting invalid or expired JWTs are denied by the
  jwt-authz policy. The ztunnel node agent provides L4 mTLS between mesh
  workloads. Access decisions are recorded in the Envoy access logs of the
  tenant ingress gateway (kubectl logs -n istio-tenant-gateway
  deploy/tenant-ingressgateway).

  All policies are declarative: the Package CR contains an sso block, and
  the UDS Operator creates the AuthorizationPolicies and waypoint. No
  imperative CLI commands needed.


  Recommended Compelling Evidence:

  1.) Istio AuthorizationPolicy YAML for podinfo (kubectl get authorizationpolicy
  -n lab-sso-app -o yaml).

  2.) OIDC challenge on an unauthenticated request: curl -sk
  https://podinfo.uds.dev/ → 302 with a Location header pointing at
  https://sso.uds.dev/realms/uds/protocol/openid-connect/auth including
  client_id=uds-lab-podinfo and a PKCE S256 code challenge.

  3.) The CUSTOM AuthorizationPolicy wiring ext_authz to authservice
  (kubectl get authorizationpolicy uds-lab-podinfo-authservice -n lab-sso-app
  -o yaml) and the authservice deployment itself (kubectl get pods -n
  authservice).

assessment-procedures: >-
  Test 1: Verify the operator-generated AuthorizationPolicies exist (kubectl
  get authorizationpolicy -n lab-sso-app — expect the deny-all-except-waypoint
  DENY, protect-podinfo-ingress ALLOW, authservice CUSTOM, and jwt-authz DENY
  policies plus the jwt-authn RequestAuthentication). Test 2: Send an
  unauthenticated request to the podinfo endpoint and verify a 302 redirect
  to the Keycloak authorization endpoint. Test 3: Complete an OIDC login and
  verify the application is reachable with an authenticated session. Test 4:
  Present an invalid or expired JWT and verify the jwt-authz policy denies
  it. Test 5: Examine tenant-gateway Envoy access logs and confirm requests
  and response codes are recorded.
