control-implementation-status: Implemented
security-control-designation: Applicable - the lab enforces access control at the network perimeter
control-implementation-narrative: >-
  This lab implements AC-3.1 through layered network access enforcement via
  Istio Ambient and Authservice. The enforcement model is: (1) All ingress
  traffic arrives at the tenant gateway in the lab-sso-app namespace. (2)
  Authservice (deployed as sidecar in the gateway) intercepts requests and
  validates OIDC tokens by exchanging them with Keycloak. Tokens missing,
  expired, or invalid (signature, expiration, claim validation) trigger a
  302 redirect to the Keycloak authorization endpoint (sso.uds.dev). (3)
  After successful OIDC login, Keycloak returns a Bearer token. (4) The
  waypoint proxy (uds-lab-podinfo-waypoint) enforces AuthorizationPolicy:
  allow ONLY traffic from the gateway (via mTLS peer identity). (5) The
  podinfo pod receives the request with X-Remote-User and X-Remote-Groups
  headers injected by Authservice, confirming authentication. (6) All access
  decisions are logged by Envoy access logs (captured by Falco/Lula audit
  plugin). Policy is declarative via Package CR sso block; no per-route
  policy configuration needed. Access enforcement is fail-safe: any request
  without a valid OIDC token is denied at the gateway (403) before reaching
  the pod. This implementation prevents unauthorized access to the application
  workload while preserving the user experience (transparent OIDC redirect).
uds-alignment: istio-ambient-authservice

