control-implementation-status: Implemented
security-control-designation: Applicable - the lab enforces access control at the network perimeter
control-implementation-narrative: >-
  This lab implements AC-3.1 through layered network access enforcement via
  Istio Ambient and Authservice. The enforcement model is: (1) All ingress
  traffic for podinfo.uds.dev terminates TLS at the tenant ingress gateway.
  (2) Traffic is routed through the package's ambient waypoint
  (uds-lab-podinfo-waypoint); the deny-all-except-waypoint
  AuthorizationPolicy ensures the pod only accepts traffic that traversed
  the waypoint, with peer identity established by ztunnel L4 mTLS. (3) At
  the waypoint, the CUSTOM AuthorizationPolicy uds-lab-podinfo-authservice
  forwards each request to the standalone authservice deployment via Envoy
  ext_authz. (4) Requests without a valid session are 302-redirected to the
  Keycloak authorization endpoint (sso.uds.dev/realms/uds) using the OIDC
  authorization code flow with PKCE. (5) After login, authservice exchanges
  the returned authorization code for tokens server-side and establishes
  the user session; RequestAuthentication uds-lab-podinfo-jwt-authn plus
  the uds-lab-podinfo-jwt-authz DENY policy reject any request bearing a
  missing, malformed, or expired JWT. (6) Access decisions are recorded in
  the tenant-gateway Envoy access logs (method, path, response code, source
  IP, request ID); UDS Core also ships Vector and Loki for cluster-wide log
  aggregation. Policy is declarative via the Package CR sso block; no
  per-route policy configuration is needed. Enforcement fails safe:
  unauthenticated browsers never reach the pod (they are redirected to
  Keycloak), and requests with invalid tokens are denied by the JWT
  policies. This prevents unauthorized access to the application workload
  while preserving the user experience (transparent OIDC redirect).
uds-alignment: istio-ambient-authservice

