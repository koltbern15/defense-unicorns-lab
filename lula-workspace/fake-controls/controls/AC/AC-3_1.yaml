family: AC
control-acronym: AC-3
control-information: >-
  Description:

  The information system enforces approved authorizations for logical access to
  information and system resources in accordance with applicable access control
  policies. The information system supports access control enforcement by:

  a. Defining and documenting access control policies for the information
  system;

  b. Enforcing access control policies via mechanisms (e.g., access control
  lists, role-based access control, attribute-based access control);

  c. Ensuring that access control enforcement is based on a current and
  accurate source of truth for access requirements; and

  d. Monitoring and logging access control decisions.


  Supplemental Guidance:

  Access enforcement represents the cornerstone of access control policy.
  Effective enforcement requires mechanisms that translate access policies
  (which are often written in natural language) into system-enforced rules and
  procedures. Access control enforcement may be accomplished by a variety of
  mechanisms (e.g., physical environmental controls, access control lists,
  cryptographic controls, or a combination thereof).


ap-acronym: AC-3.1
cci: 002142
cci-definition: >-
  002142: The information system enforces approved authorizations for
  access to the information system in accordance with the access control
  policies.
implementation-guidance: >-
  UDS Core (Istio Ambient + Authservice) enforces declarative access control
  through Istio AuthorizationPolicy (ALLOW rules) and tenant gateways with
  waypoints. For the lab deployment:

  The podinfo application in lab-sso-app namespace has an AuthorizationPolicy
  that denies all traffic except from the ambient waypoint
  (uds-lab-podinfo-waypoint). The Authservice sidecar (running in the gateway)
  intercepts all requests, validates OIDC tokens against Keycloak, and injects
  the OIDC claims as HTTP headers (X-Remote-User, X-Remote-Groups, etc.). The
  waypoint proxy enforces mTLS between the ingress gateway and the workload.
  Requests lacking valid OIDC tokens are rejected at the gateway; only
  authenticated requests (with valid Bearer tokens) proceed to the application
  pod. Access decisions are logged by Envoy access logs (captured in
  opa-audit-* pods via Falco integration).

  All policies are declarative: Package CR contains sso block, UDS Operator
  creates AuthorizationPolicy and binds waypoint labels. No imperative CLI
  commands needed.


  Recommended Compelling Evidence:

  1.) Istio AuthorizationPolicy YAML for podinfo (kubectl get authorizationpolicy
  -n lab-sso-app -o yaml).

  2.) Successful OIDC redirect: curl -sk -H "Authorization: Bearer TOKEN"
  https://podinfo.uds.dev/ → 200 OK (app receives request). Without token:
  → 403 Forbidden (waypoint denies traffic).

  3.) Authservice configuration showing OIDC validation rules (kubectl get
  configmap -n lab-sso-app authservice-config -o yaml or Admin Console).

assessment-procedures: >-
  Test 1: Verify AuthorizationPolicy exists and denies all traffic except
  waypoint (kubectl describe authorizationpolicy -n lab-sso-app podinfo-deny-all).
  Test 2: Test unauthenticated request to podinfo endpoint and verify 403
  response. Test 3: Test authenticated request with valid OIDC token and verify
  200 response. Test 4: Verify Authservice validates token expiration and claim
  structure. Test 5: Examine Envoy access logs and confirm token validation
  events are logged.
