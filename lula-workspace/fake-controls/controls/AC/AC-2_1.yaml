security-control-designation: Applicable - account types and lifecycle management critical for access control
control-implementation-narrative: >-
  This lab deployment implements AC-2.1 through centralized Keycloak identity
  management. Three account types are managed: (1) UDS realm admin accounts
  (created via Keycloak Welcome Page with first/last name and email
  validation), (2) OIDC client accounts (auto-provisioned by UDS Operator
  from Package CR sso blocks; clients authenticate via client credentials
  or authorization code flows), and (3) tenant user accounts (created in
  realm-specific containers via Keycloak API, intended for end-user login
  flows). Account provisioning is declarative for clients (Package CR sso
  block updates trigger UDS Operator reconciliation) and imperative for
  users (Welcome Page registration or Keycloak admin API calls). All account
  modifications and deletions route through either the Keycloak admin console
  (RBAC-controlled) or authenticated Keycloak admin APIs. Monitoring is
  currently performed by inspecting the operator-managed client Secrets
  (kubectl get secret -n lab-sso-app sso-client-uds-lab-podinfo); reviewing
  Keycloak event logs (Admin Console > Events tab) is the designed
  monitoring path once admin access is established (pending — see Test 3).
  Account
  cessation is declarative for clients — removing the sso block from the
  Package CR causes the UDS Operator to delete the Keycloak client and its
  credential Secret — and imperative for users (removal via the Keycloak
  Admin Console or API). This implementation aligns with zero-trust
  principles: account operations require authenticated identity, account
  credentials are never transmitted in cleartext (OIDC flows use
  authorization-code exchange, client credentials live in Kubernetes
  Secrets guarded by RBAC), and the admin interfaces are not exposed
  publicly — they sit behind the admin gateway or a local tunnel.
uds-alignment: keycloak

